title: Suspicious Explicit Credential Logons from Non-Domain IPs
id: ec25a008-30bd-4f33-87a0-3bf3321faae8
status: test
description: Detects explicit credential use (Event 4648) originating from IP addresses outside the expected domain network range
logsource:
  product: windows
  service: security
detection:
  # Check event ID 4648
  selection1:
    EventID: 4648
  # Also filter out expected IDs
  selection2:
    Network_Address:
      - "127.0.0.1"
      - "192.168.4.10"
  condition: selection1 and not selection2
level: high
---
title: Credential requests from non-domain hosts
id: c4e68017-a6f4-4602-9a25-6cc7712efd0a
